services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wavetask
      POSTGRES_PASSWORD: wavetask
      POSTGRES_DB: wavetask
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wavetask"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://wavetask:wavetask@postgres:5432/wavetask
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

  keeper:
    build:
      context: ./keeper
      dockerfile: Dockerfile
    env_file:
      - ./keeper/.env
    depends_on:
      - backend

volumes:
  pgdata:
